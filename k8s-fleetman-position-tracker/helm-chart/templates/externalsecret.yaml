{{- if .Values.externalSecret.enabled }}
# Pulls the app's sensitive values from AWS Secrets Manager (via the ClusterSecretStore)
# and creates a Kubernetes Secret named like the app. The Deployment then loads that
# Secret as env vars (set existingSecret.name to the same name).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  namespace: {{ required "values.yaml: namespace is required" .Values.namespace | quote }}
  name: {{ include "app.fullname" . }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ default "1h" .Values.externalSecret.refreshInterval | quote }}
  secretStoreRef:
    name: {{ required "externalSecret.secretStoreName is required" .Values.externalSecret.secretStoreName }}
    kind: {{ default "ClusterSecretStore" .Values.externalSecret.secretStoreKind }}
  target:
    name: {{ include "app.fullname" . }}   # the K8s Secret this creates
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: {{ required "externalSecret.remoteKey is required" .Values.externalSecret.remoteKey }}
{{- end }}
