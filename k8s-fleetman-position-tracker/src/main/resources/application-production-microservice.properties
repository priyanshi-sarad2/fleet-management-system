spring.activemq.broker-url=${ACTIVEMQ_BROKER_URL:tcp://fleetman-queue.default.svc.cluster.local:61616}
spring.activemq.user=${ACTIVEMQ_USER:}
spring.activemq.password=${ACTIVEMQ_PASSWORD:}
fleetman.position.queue=positionQueue

# We'll use the default port 8080 for all microservices in production cluster.

# MongoDB connection. Set MONGODB_URI (e.g. the MongoDB Atlas SRV string, including the password)
# via the deployment/Secret. Falls back to the in-cluster MongoDB when not set (local dev).
spring.data.mongodb.uri=${MONGODB_URI:mongodb://fleetman-mongodb.default.svc.cluster.local:27017/fleetman}