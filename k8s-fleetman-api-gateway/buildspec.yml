version: 0.2
phases:
  pre_build:
    commands:
      - aws ecr get-login-password --region ${REGION} | docker login -u AWS --password-stdin ${ECR_LOGIN}

  build:
    commands:
      - echo Building the Docker image...
      - k8s-fleetman-api-gateway
      - TAG="v${CODEBUILD_RESOLVED_SOURCE_VERSION:0:5}-$(date +%I-%M-%y-%m-%d)"
      - docker build -t ${ECR_REPOSITORY_URI}:${TAG} .

  post_build:
    commands:
      - echo Pushing the Docker image...
      - docker push ${ECR_REPOSITORY_URI}:${TAG}
      - echo Writing image tag artifact for EKS/Helm deploy...
      - printf "%s" "${TAG}" > image-tag.txt

artifacts:
  files:
    - image-tag.txt         # Image tag passed to the EKS deploy stage
    - eks-deployspec.yml    # EKS deploy stage buildspec (consumed from build_output)
    - helm-chart/**/*       # Helm chart needed by the EKS deploy stage
  base-directory: .

# For the EKS deploy stage, the Helm chart must be available in the artifact passed to the next stage.
# The Helm chart already exists in this repo; adding `helm-chart/**/*` under `artifacts.files` makes CodeBuild include it in `build_output`.
# Each docker build + push creates a new image tag, so we write the tag to `image-tag.txt` and pass it forward as part of `build_output`.

# Why is eks-deployspec.yml needed in the build output?
# The build stage gets all repo data as its input artifact, so it can use whichever file it needs.
# But the deploy stage's incoming input artifact only has the build output, not the complete repo data.
# So we pass eks-deployspec.yml to the deploy stage so it can use it to deploy the Helm chart.
