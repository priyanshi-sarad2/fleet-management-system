version: 0.2
phases:
  install:
    commands:
      - set -euo pipefail
      - echo "Installing kubectl + helm..."
      - curl -sSL -o kubectl "https://dl.k8s.io/release/$(curl -sSL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
      - install -m 0755 kubectl /usr/local/bin/kubectl
      - HELM_VERSION="v4.0.4"
      - curl -sSL "https://get.helm.sh/helm-${HELM_VERSION}-linux-amd64.tar.gz" -o helm.tar.gz
      - tar -xzf helm.tar.gz
      - install -m 0755 linux-amd64/helm /usr/local/bin/helm
      - kubectl version --client
      - helm version
  pre_build:
    commands:
      - echo "Reading image tag from artifact..."
      - test -f image-tag.txt
      - IMAGE_TAG="$(cat image-tag.txt)"
      - echo "IMAGE_TAG=$IMAGE_TAG"
      - echo "Ensuring Helm chart is present..."
      - test -d "$HELM_CHART_PATH"
      - echo "Configuring kubeconfig..."

      # I have used this command to generate kubeconfig gor my eks cluster as well
      - aws eks update-kubeconfig --region "$AWS_REGION" --name "$EKS_CLUSTER_NAME" 
      # this command creates a kubeconfig file in the home directory of the user running the command. In this case, it is the CodeBuild user.

      # NOTE: avoid cluster-scope calls like `kubectl get ns` since the code-pipeline role does not have cluster-scope access. But I only gave it namespace scope access.
      - kubectl -n "$K8S_NAMESPACE" get pods >/dev/null
  build:
    commands:
      - echo "Deploying with Helm..."
      # --force-conflicts: charts with an ExternalSecret share ownership of fields (e.g. .spec.refreshInterval)
      # with the external-secrets controller. Helm 4 uses server-side apply, so without this flag the upgrade
      # fails with a field-manager conflict. This lets Helm take ownership and apply cleanly. Harmless here
      # (api-gateway has no ExternalSecret) but kept identical across all services' deployspecs.
      - helm upgrade --install "$HELM_RELEASE_NAME" "$HELM_CHART_PATH" --namespace "$K8S_NAMESPACE" -f "$HELM_VALUES_FILE" --set image.repository="$ECR_REPOSITORY_URI" --set image.tag="$IMAGE_TAG" --wait --timeout 10m --force-conflicts 
      # this command installs the Helm chart in the namespace and waits for the deployment to be ready.
      # If the release is already installed, this command will upgrade the release to the new version.
      # If the release is not installed, this command will install the release.

      - kubectl -n "$K8S_NAMESPACE" rollout status deploy -l "app.kubernetes.io/instance=$HELM_RELEASE_NAME" --timeout=10m || true 
      # this command waits for the deployment to be ready and then checks if it is ready.
