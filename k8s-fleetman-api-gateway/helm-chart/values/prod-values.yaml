project: fleetman
env: prod
namespace: fleetman-prod
replicaCount: 1

autoscaling:
  enabled: false

image:
  repository: "176777036446.dkr.ecr.us-east-1.amazonaws.com/fleetman-api-gateway"
  tag: "v16-06-26-14-43-09"
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

# ALB Ingress (public entry point). Provisioned by the AWS Load Balancer Controller.
ingress:
  enabled: true                  # set true to expose the gateway via ALB
  className: alb
  host: "fleetman-api.priyanshiseniordevops.online"
  groupName: fleetman            # IngressGroup -> all apps/clients with this name share ONE ALB
  scheme: internet-facing
  targetType: ip
  # Wildcard ACM cert (*.priyanshiseniordevops.online) in the CURRENT account (958941188585).
  # CloudFront fronts the ALB over HTTPS using the fleetman-alb CNAME, whose name matches
  # this wildcard cert -> the ALB's 443 listener serves it cleanly (no SNI mismatch).
  certificateArn: "arn:aws:acm:us-east-1:958941188585:certificate/a0b3ab0c-70ca-402c-8ab4-6c0c532339df"
  sslRedirect: false             # CloudFront connects on 443; keep 80 open, no forced redirect
  healthcheckPath: /             # the gateway serves a 200 at "/"
  path: /
  pathType: Prefix
  extraAnnotations: {}

configmap:
  create: true
  data:
    # Activates application-production-microservice.properties
    SPRING_PROFILES_ACTIVE: "production-microservice"
    # Overrides position-tracker-url (the properties file points at the default namespace)
    POSITION_TRACKER_URL: "http://fleetman-position-tracker:8080"
    # CORS: origin of the static webapp (served from CloudFront). Allows the
    # browser to call this API cross-origin (REST + WebSocket). Comma-separated.
    ALLOWED_ORIGINS: "https://fleetman.priyanshiseniordevops.online"


# Optional: create a Kubernetes Secret via Helm (turn OFF if you use AWS Secrets Manager/CSI)
secret:
  create: false
  type: Opaque
  stringData: {}
  # If you already have base64 values, you can use `data` instead
  data: {}


probes:
  liveness:
    enabled: false
    path: /healthcheck
  readiness:
    enabled: false
    path: /healthcheck

serviceAccount:
  # Use the pre-created IRSA ServiceAccount in the cluster (no ServiceAccount template in this chart).
  create: false




# Optional: override app/chart name in resources (defaults to Chart.yaml name)
# nameOverride: riddhi-gsp-api
# fullnameOverride: riddhi-gsp-api


# Optional: for ECR this is usually NOT needed, so keep it empty
# imagePullSecrets:
#   - name: some-registry-secret


existingSecret:
  name: ""
# /*
#  existingSecret:
#  Use this when the Secret already exists in the cluster (created outside Helm).
#  If you set `existingSecret.name`, the Deployment will load ALL keys from that Secret as environment variables (envFrom -> secretRef).
#  Keep it empty if you don't have a pre-created Secret, or if you are using `secret.create: true` instead.
# */


# Optional: extra env vars as a simple key/value map (rendered into env:)
envVars: {}

# Optional: advanced env entries (valueFrom, etc.)
extraEnv: []


podAnnotations: {}
# /*
#  podAnnotations:
#  Extra metadata you want to add to the Pods (annotations).
#  Common uses: Prometheus scraping, service-mesh/sidecar flags, custom tooling tags, etc.
#
#  Example:
#    podAnnotations:
#      prometheus.io/scrape: "true"
#      prometheus.io/port: "8000"
# */


resources: {}
#
#  Container CPU/memory requests & limits
#  - requests: used for scheduling (guaranteed minimum)
#  - limits: hard cap enforced by Kubernetes
#
#  Example:
#    resources:
#      requests:
#        cpu: "200m"
#        memory: "256Mi"
#      limits:
#        cpu: "500m"
#        memory: "512Mi"
#


podSecurityContext: {}
containerSecurityContext: {}
# /*
#  Security context (basic container hardening)
#
#  - podSecurityContext: applies at Pod level (example: fsGroup for permissions on mounted volumes)
#  - containerSecurityContext: applies to the container process (example: runAsNonRoot, readOnlyRootFilesystem)
#
#  Example:
#    podSecurityContext:
#      fsGroup: 2000
#    containerSecurityContext:
#      runAsNonRoot: true
#      runAsUser: 1000
#      allowPrivilegeEscalation: false
#      readOnlyRootFilesystem: true
# */