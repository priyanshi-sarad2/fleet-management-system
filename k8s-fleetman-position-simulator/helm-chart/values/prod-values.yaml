project: fleetman
env: prod
namespace: fleetman-prod
replicaCount: 1

autoscaling:
  enabled: false

image:
  repository: "176777036446.dkr.ecr.us-east-1.amazonaws.com/fleetman-position-simulator"
  tag: "v16-06-26-14-43-09"
  pullPolicy: Always

# The simulator only publishes to the queue and exposes no port, so it gets no Service.
service:
  enabled: false

# Non-sensitive config only. Sensitive values (ActiveMQ credentials)
# come from AWS Secrets Manager and are synced into a Kubernetes Secret by External Secrets.
configmap:
  create: true
  data:
    # Activates application-production-microservice.properties
    SPRING_PROFILES_ACTIVE: "production-microservice"


secret:
  create: false
  type: Opaque
  stringData: {}
  # If you already have base64 values, you can use `data` instead
  data: {}


# External Secrets Operator: sync sensitive env vars from AWS Secrets Manager
# into a K8s Secret (named like the app), which the Deployment loads via envFrom.
externalSecret:
  enabled: true
  secretStoreName: aws-secretsmanager
  secretStoreKind: ClusterSecretStore
  remoteKey: fleetman-prod/position-simulator   # the Secrets Manager secret
  refreshInterval: 1h


probes:
  liveness:
    enabled: false
    path: /healthcheck
  readiness:
    enabled: false
    path: /healthcheck

serviceAccount:
  # Use the pre-created IRSA ServiceAccount in the cluster (no ServiceAccount template in this chart).
  create: false




# Optional: override app/chart name in resources (defaults to Chart.yaml name)
# nameOverride: 
# fullnameOverride: 


# Optional: for ECR this is usually NOT needed, so keep it empty
# imagePullSecrets:
#   - name: some-registry-secret


existingSecret:
  name: "fleetman-position-simulator"   
# the Secret created by the ExternalSecret above
# /*
#  existingSecret:
#  Use this when the Secret already exists in the cluster (created outside Helm).
#  If you set `existingSecret.name`, the Deployment will load ALL keys from that Secret as environment variables (envFrom -> secretRef).
#  Keep it empty if you don't have a pre-created Secret, or if you are using `secret.create: true` instead.
# */


# Optional: extra env vars as a simple key/value map (rendered into env:)
envVars: {}

# Optional: advanced env entries (valueFrom, etc.)
extraEnv: []


podAnnotations: {}
# /*
#  podAnnotations:
#  Extra metadata you want to add to the Pods (annotations).
#  Common uses: Prometheus scraping, service-mesh/sidecar flags, custom tooling tags, etc.
#
#  Example:
#    podAnnotations:
#      prometheus.io/scrape: "true"
#      prometheus.io/port: "8000"
# */


resources: {}
#
#  Container CPU/memory requests & limits
#  - requests: used for scheduling (guaranteed minimum)
#  - limits: hard cap enforced by Kubernetes
#
#  Example:
#    resources:
#      requests:
#        cpu: "200m"
#        memory: "256Mi"
#      limits:
#        cpu: "500m"
#        memory: "512Mi"
#


podSecurityContext: {}
containerSecurityContext: {}
# /*
#  Security context (basic container hardening)
#
#  - podSecurityContext: applies at Pod level (example: fsGroup for permissions on mounted volumes)
#  - containerSecurityContext: applies to the container process (example: runAsNonRoot, readOnlyRootFilesystem)
#
#  Example:
#    podSecurityContext:
#      fsGroup: 2000
#    containerSecurityContext:
#      runAsNonRoot: true
#      runAsUser: 1000
#      allowPrivilegeEscalation: false
#      readOnlyRootFilesystem: true
# */