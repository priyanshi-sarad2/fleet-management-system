version: 0.2

# Static build for the Angular webapp (deployed to S3 + CloudFront, not EKS).
# Angular 6 must build on Node 10 (same as its Dockerfile), so we install Node 10
# via nvm. nvm is a shell function, and CodeBuild runs each list command in its own
# shell, so each step that needs nvm sources it and uses it in the SAME command (&&).
phases:
  install:
    commands:
      - echo "Installing Node 10 (Angular 6 requires it)..."
      - curl -fsSL -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.7/install.sh | bash
      - export NVM_DIR="$HOME/.nvm" && . "$NVM_DIR/nvm.sh" && nvm install 10 && nvm use 10 && node -v && npm -v && cd "$CODEBUILD_SRC_DIR/k8s-fleetman-webapp-angular" && npm ci

  build:
    commands:
      # One combined command: load nvm, bake API_URL into the prod environment, then build.
      # Single-quoted YAML scalar so the colons in the JS object don't break YAML parsing
      # (inner single quotes around ${API_URL} are doubled per YAML escaping rules).
      - 'export NVM_DIR="$HOME/.nvm" && . "$NVM_DIR/nvm.sh" && nvm use 10 && cd "$CODEBUILD_SRC_DIR/k8s-fleetman-webapp-angular" && echo "Injecting API_URL=$API_URL" && echo "export const environment = { production: true, apiUrl: ''${API_URL}'' };" > src/environments/environment.prod.ts && cat src/environments/environment.prod.ts && echo "Building Angular app..." && npm run build && ls -la dist'

# The built static site (index.html + assets) is in k8s-fleetman-webapp-angular/dist.
# It becomes the build_output artifact, which the Deploy stage extracts to the S3 bucket.
artifacts:
  files:
    - "**/*"
  base-directory: k8s-fleetman-webapp-angular/dist
  discard-paths: no
