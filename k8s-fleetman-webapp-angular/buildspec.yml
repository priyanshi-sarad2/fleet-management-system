version: 0.2

# Static build for the Angular webapp (deployed to S3 + CloudFront, not EKS).
# This app is Angular 6 and must build on Node 10 (same as its Dockerfile),
# so we install Node 10 via nvm on the standard CodeBuild image.
phases:
  install:
    commands:
      - echo "Installing Node 10 (Angular 6 requires it)..."
      - curl -fsSL -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.7/install.sh | bash
      - export NVM_DIR="$HOME/.nvm"
      - . "$NVM_DIR/nvm.sh"
      - nvm install 10
      - nvm use 10
      - node -v && npm -v
      - cd "$CODEBUILD_SRC_DIR/k8s-fleetman-webapp-angular"
      - npm ci

  build:
    commands:
      - export NVM_DIR="$HOME/.nvm" && . "$NVM_DIR/nvm.sh" && nvm use 10
      - cd "$CODEBUILD_SRC_DIR/k8s-fleetman-webapp-angular"
      # Bake the API gateway URL (passed as the API_URL CodeBuild env var) into the
      # production environment so the SPA calls the API directly (no nginx proxy).
      - echo "Injecting API_URL=$API_URL into environment.prod.ts"
      # Single-quoted YAML scalar so the colons in the JS object don't break YAML parsing.
      # (Inner single quotes around ${API_URL} are doubled per YAML escaping rules.)
      - 'echo "export const environment = { production: true, apiUrl: ''${API_URL}'' };" > src/environments/environment.prod.ts'
      - cat src/environments/environment.prod.ts
      - echo "Building Angular app (ng build --prod)..."
      - npm run build
      - ls -la dist

# The built static site (index.html + assets) is in k8s-fleetman-webapp-angular/dist.
# It becomes the build_output artifact, which the Deploy stage extracts to the S3 bucket.
artifacts:
  files:
    - "**/*"
  base-directory: k8s-fleetman-webapp-angular/dist
  discard-paths: no
